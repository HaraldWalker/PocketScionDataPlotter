name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.9'
          - os: ubuntu-latest
            python-version: '3.9'

    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build application
      run: |
        python -m PyInstaller --windowed --onefile --name "PocketScionPlotter" pocket_scion_data_plotter.py

    - name: Create artifacts directory
      run: mkdir -p dist

    - name: Package for ${{ matrix.os }}
      run: |
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          # macOS: Create .app bundle
          mkdir -p "PocketScionPlotter.app/Contents/MacOS"
          cp "dist/PocketScionPlotter" "PocketScionPlotter.app/Contents/MacOS/"
          echo '#!/bin/bash' > "PocketScionPlotter.app/Contents/MacOS/PocketScionPlotter"
          echo 'exec "`dirname "$0"`/PocketScionPlotter"' >> "PocketScionPlotter.app/Contents/MacOS/PocketScionPlotter"
          chmod +x "PocketScionPlotter.app/Contents/MacOS/PocketScionPlotter"
          zip -r "PocketScionDataPlotter-macos.zip" "PocketScionPlotter.app"
        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows: Create .zip with executable
          cd dist && zip "PocketScionDataPlotter-windows.zip" "PocketScionPlotter.exe"
        else
          # Linux: Create .tar.gz with executable
          cd dist && tar -czf "PocketScionDataPlotter-linux.tar.gz" "PocketScionPlotter"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pocket-scion-data-plotter-${{ matrix.os }}
        path: dist/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Pocket Scion Data Plotter ${{ github.ref_name }}
        body: |
          ## Pocket Scion Data Plotter ${{ github.ref_name }}
          
          ### Features
          - Real-time OSC data plotting with dark theme
          - Custom ClickableLabel components for macOS compatibility
          - Data selection, export, and plot saving functionality
          - 30-second time window with compact horizontal controls
          
          ### Downloads
          - **macOS**: `PocketScionDataPlotter-macos.zip`
          - **Windows**: `PocketScionDataPlotter-windows.zip`
          - **Linux**: `PocketScionDataPlotter-linux.tar.gz`
          
          ### Installation
          1. Download appropriate file for your platform
          2. Extract and run the executable
          3. Follow setup instructions in README.md
        draft: false
        prerelease: false

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/PocketScionDataPlotter-${{ matrix.os }}.*
        asset_name: PocketScionDataPlotter-${{ matrix.os }}
        asset_content_type: application/zip
